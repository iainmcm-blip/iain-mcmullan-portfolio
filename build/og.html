<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body {
    font-family:'Hanken Grotesk','Helvetica Neue',Arial,sans-serif;
    background:
      radial-gradient(60% 55% at 16% 16%, rgba(63,67,128,0.08), transparent 70%),
      radial-gradient(50% 50% at 88% 90%, rgba(120,110,94,0.06), transparent 72%),
      #F7F5EF;
    color:#1B1B20;
    position:relative;
    overflow:hidden;
  }
  .wrap { position:absolute; inset:0; padding:90px 96px; display:flex; flex-direction:column; justify-content:center; }
  .eyebrow { font-size:21px; font-weight:600; letter-spacing:.34em; text-transform:uppercase; color:#3F4380; margin-bottom:28px; }
  h1 { font-family:'Fraunces',Georgia,serif; font-size:104px; font-weight:600; line-height:0.98; letter-spacing:-0.015em; color:#1B1B20; }
  .sub { font-family:'Fraunces',Georgia,serif; font-style:italic; font-size:42px; font-weight:500; color:#3F4380; margin-top:18px; letter-spacing:-0.01em; }
  .accent { width:96px; height:3px; background:#3F4380; border-radius:2px; margin:34px 0 26px; }
  .brands { font-size:23px; font-weight:500; color:#55535C; letter-spacing:.01em; }
  .url { position:absolute; bottom:54px; right:96px; font-size:21px; font-weight:600; color:#55535C; }
  .monogram {
    position:absolute; top:72px; right:96px; width:104px; height:104px; border-radius:24px;
    background:#3F4380; display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',Georgia,serif; font-size:46px; font-weight:600; color:#F7F5EF; letter-spacing:-0.02em;
  }
</style></head>
<body>
  <div class="monogram">IM</div>
  <div class="wrap">
    <div class="eyebrow">Strategy &middot; Storytelling &middot; Impact</div>
    <h1>Iain McMullan</h1>
    <div class="sub">Brand strategy &amp; marketing leadership</div>
    <div class="accent"></div>
    <div class="brands">20+ years &middot; Emirates &middot; Hilton &middot; Malaysia Airlines &middot; UOB &middot; Singapore</div>
  </div>
  <div class="url">iainmcmullan.com</div>
</body></html>
