<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body {
    font-family:'Hanken Grotesk','Helvetica Neue',Arial,sans-serif;
    background:
      radial-gradient(50% 45% at 16% 12%, rgba(190,198,224,0.12), transparent 70%),
      radial-gradient(42% 45% at 90% 20%, rgba(93,230,255,0.07), transparent 70%),
      radial-gradient(55% 50% at 70% 100%, rgba(190,198,224,0.05), transparent 75%),
      #0a1628;
    color:#e4e2e3;
    position:relative;
    overflow:hidden;
  }
  .wrap { position:absolute; inset:0; padding:88px 96px; display:flex; flex-direction:column; justify-content:center; }
  .eyebrow { font-size:22px; font-weight:600; letter-spacing:.34em; text-transform:uppercase; color:#bbc7df; margin-bottom:30px; }
  h1 { font-size:104px; font-weight:800; line-height:1.0; letter-spacing:-0.02em; color:#f5f6f8; }
  .sub { font-size:40px; font-weight:600; color:#bbc7df; margin-top:22px; letter-spacing:-0.01em; }
  .accent { width:96px; height:4px; background:#bbc7df; border-radius:2px; margin:34px 0 26px; }
  .brands { font-size:23px; font-weight:500; color:#9a9ba6; letter-spacing:.01em; }
  .url { position:absolute; bottom:54px; right:96px; font-size:21px; font-weight:600; color:#c5c6cd; }
  .monogram {
    position:absolute; top:72px; right:96px; width:104px; height:104px; border-radius:24px;
    background:rgba(190,198,224,0.10); border:1.5px solid rgba(190,198,224,0.30);
    display:flex; align-items:center; justify-content:center;
    font-size:46px; font-weight:800; color:#bbc7df; letter-spacing:-0.02em;
  }
</style></head>
<body>
  <div class="monogram">IM</div>
  <div class="wrap">
    <div class="eyebrow">Strategy &middot; Storytelling &middot; Impact</div>
    <h1>Iain McMullan</h1>
    <div class="sub">Brand Strategy &amp; Marketing Leadership</div>
    <div class="accent"></div>
    <div class="brands">20+ years &middot; Emirates &middot; Hilton &middot; Malaysia Airlines &middot; UOB &middot; Singapore</div>
  </div>
  <div class="url">iainmcm-blip.github.io/iain-mcmullan-portfolio</div>
</body></html>
